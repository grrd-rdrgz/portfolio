<style>
    
body {
    margin: 0;
    background-color: black;
    overflow-x: hidden;
}
    
.matrix-container {
    position: relative;
    height: 100vh;
    
}

.matrix-column {
    position: absolute;
    top: 0;
    color: #0f0;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    writing-mode: vertical-rl;
    text-orientation: upright;
    white-space: nowrap;
    animation: fall linear infinite;
    text-shadow: 0 5px 5px #0f0;
    width: auto;
}

@keyframes fall {
    0% {
        transform: translateY(-100%);
        
    }
    50% {
        opacity: 100%;
    }
    100% {
        transform: translateY(100vh);
        opacity: 0;
    }
}

/* Fade-out gradient overlay */
.matrix-column::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 30%;
    background: linear-gradient(to bottom, transparent 0%, black 100%);
    pointer-events: none;
}

.scanlines {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(
        to bottom,
        rgba(0, 255, 0, 0.1) 0%,
        rgba(0, 255, 0, 0.1) 3%,
        transparent 3%,
        transparent 97%,
        rgba(0, 255, 0, 0.1) 97%,
        rgba(0, 255, 0, 0.1) 100%
    );
    background-size: 100% 4px;
}
</style>
<div class="matrix-container">
    <div class="scanlines"></div>
</div>

<script>
function generateMatrixCode(element) {
    const characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ1234567890~`!@#$%^&*()-_';
    element.textContent = '';
    
    const charCount = Math.floor(window.innerHeight / 20);
    for (let i = 0; i < charCount; i++) {
        element.textContent += characters.charAt(
            Math.floor(Math.random() * characters.length)
        ) + '\n';
    }
}

setInterval(() => {
    document.querySelectorAll('.matrix-column').forEach(column => {
        generateMatrixCode(column);
    });
}, 500);

window.addEventListener('load', () => {
    const container = document.querySelector('.matrix-container');
    const columnCount = Math.floor(window.innerWidth / 30);
    
    for (let i = 0; i < columnCount; i++) {
        const column = document.createElement('div');
        column.className = 'matrix-column';
        column.style.left = `${(i * 3) + Math.random() * 4}%`;
        column.style.animationDuration = `${3 + Math.random() * 4}s`;
        column.style.animationDelay = `${Math.random() * 5}s`;
        container.appendChild(column);
    }
});
</script>
